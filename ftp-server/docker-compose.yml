version: '3.8'
services:
  ftp:
    image: stilliard/pure-ftpd:hardened
    container_name: ftp-server
    restart: always
    ports:
      - "21:21"
      - "30000-30009:30000-30009"
    environment:
      PUBLICHOST: "localhost"
      FTP_USER_NAME: "guest"
      FTP_USER_PASS: "guest123"
      FTP_USER_HOME: "/home/ftpusers/guest"
      ADDED_FLAGS: "-d -d"
    volumes:
      - ./ftp-data/guest:/home/ftpusers/guest
      - ./ftp-data/prof1:/home/ftpusers/prof1
      - ./ftp-data/prof2:/home/ftpusers/prof2
    command: >
      /bin/bash -c '
        pure-pw useradd guest -u ftpuser -d /home/ftpusers/guest && \
        pure-pw useradd prof1 -u ftpuser -d /home/ftpusers/prof1 && \
        pure-pw useradd prof2 -u ftpuser -d /home/ftpusers/prof2 && \
        pure-pw mkdb && \
        /entrypoint.sh pure-ftpd'
    networks:
      - ftpnet
networks:
  ftpnet:
    driver: bridge
