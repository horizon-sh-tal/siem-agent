version: '3.8'

services:
  ftp:
    image: stilliard/pure-ftpd:hardened
    container_name: ftp-server
    restart: always
    ports:
      - "21:21"
      - "30000-30009:30000-30009"
    environment:
      PUBLICHOST: "192.168.27.211"  # Your FTP Server VM IP
      FTP_USER_NAME: "guest"
      FTP_USER_PASS: "guest123"
      FTP_USER_HOME: "/home/ftpusers/guest"
      ADDED_FLAGS: "-d -d"
    volumes:
      - ./ftp-data/guest:/home/ftpusers/guest
      - ./ftp-data/prof1:/home/ftpusers/prof1
      - ./ftp-data/prof2:/home/ftpusers/prof2
      - ./add_ftp_users.sh:/add_ftp_users.sh
    entrypoint: ["/bin/bash", "/add_ftp_users.sh"]
    network_mode: "host"  # Use host network for easier FTP passive mode

  ftp-monitor:
    image: python:3.9-slim
    container_name: ftp-monitor
    restart: always
    volumes:
      - ./ftp-data:/ftp-data:ro
      - ./ftp_monitor.py:/app/ftp_monitor.py
    working_dir: /app
    command: >
      sh -c "pip install kafka-python &&
             python ftp_monitor.py"
    depends_on:
      - ftp
    network_mode: "host"
